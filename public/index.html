<!DOCTYPE html>
<html lang="pt-BR">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 text-white p-6">
    <h1 class="text-3xl font-bold mb-4">GitPeticoes</h1>
    
    <div class="bg-gray-800 p-4 rounded mb-6">
        <input id="title" placeholder="Título" class="w-full p-2 mb-2 text-black"><br>
        <textarea id="body" placeholder="Manifesto" class="w-full p-2 text-black"></textarea>
        <button onclick="enviar()" class="bg-blue-600 p-2 mt-2 w-full">Criar Petição</button>
    </div>

    <div id="lista"></div>

    <script>
        async function carregar() {
            const res = await fetch('/api/peticoes');
            const data = await res.json();
            document.getElementById('lista').innerHTML = data.map(i => `<div class="bg-gray-700 p-2 mb-2">${i.title}</div>`).join('');
        }
        async function enviar() {
            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;
            await fetch('/api/peticoes', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, body}) 
            });
            carregar();
        }
        carregar();
    </script>
</body>
</html>
