<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>SPTrans Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .ui-container { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000; }
        .busca-box { background: white; padding: 15px; border-radius: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        input { border: none; width: 100%; outline: none; font-size: 16px; }
        #lista { background: white; margin-top: 10px; border-radius: 15px; max-height: 250px; overflow-y: auto; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>
    <div class="ui-container">
        <div class="busca-box">
            <input type="text" id="inputBusca" placeholder="Pesquisar..." oninput="filtrar()">
        </div>
        <div id="lista"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-23.5505, -46.6333], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let camadaBus = L.layerGroup().addTo(map);

        // Simulando banco de dados (ajuste conforme necessário)
        const linhas = [{ id: "N403-11", cl: 123 }, { id: "407L-10", cl: 456 }];

        function filtrar() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            linhas.filter(l => l.id.toLowerCase().includes(termo)).forEach(l => {
                lista.innerHTML += `<div class="item" onclick="rastrear(${l.cl})">${l.id}</div>`;
            });
        }

        function rastrear(codigoLinha) {
            // AQUI ESTÁ A CORREÇÃO: Usamos o caminho relativo /api/
            fetch(`/api/posicao/${codigoLinha}`)
                .then(res => res.json())
                .then(data => {
                    camadaBus.clearLayers();
                    // Assumindo que a resposta tem um formato que contém as posições
                    console.log("Dados recebidos:", data);
                    alert("Sucesso! Verifique o console para ver os dados.");
                })
                .catch(err => alert("Erro ao conectar ao servidor. Verifique o console!"));
        }
    </script>
</body>
</html>
